name: Build and Submit to App Store

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-submit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build iOS app for App Store (EAS cloud)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ios --profile production --non-interactive --wait

      - name: Submit to App Store Connect
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          EXPO_APPLE_APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          EXPO_APPLE_APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: eas submit --platform ios --profile production --non-interactive --latest
