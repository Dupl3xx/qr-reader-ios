<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Reader – Instalace</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    .icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #007AFF, #0A84FF);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(0,122,255,0.4);
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .version { color: #8E8E93; font-size: 15px; margin-bottom: 40px; }
    .install-btn {
      display: inline-block;
      background: #007AFF;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      padding: 18px 48px;
      border-radius: 16px;
      text-decoration: none;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,122,255,0.4);
    }
    .install-btn:active { opacity: 0.8; }
    .note {
      color: #636366;
      font-size: 13px;
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
      margin-top: 8px;
    }
    .qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 24px;
    }
    .qr-img {
      width: 180px;
      height: 180px;
      border-radius: 16px;
      border: 2px solid #38383A;
    }
    .qr-label {
      color: #636366;
      font-size: 12px;
      margin-top: 10px;
    }
    .divider { width: 60px; height: 1px; background: #38383A; margin: 32px 0; }
    .features {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 300px;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #EBEBF5CC;
      font-size: 15px;
    }
    .feature-icon {
      width: 32px;
      height: 32px;
      background: #1C1C1E;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="icon">📷</div>
  <h1>QR Reader</h1>
  <div class="version" id="versionText">v1.0.21</div>

  <a class="install-btn" href="itms-services://?action=download-manifest&url=https://dupl3xx.github.io/qr-reader-ios/manifest.plist">
    Nainstalovat
  </a>
  <div class="note">Otevři tuto stránku na iPhonu v Safari a klepni na Nainstalovat</div>

  <div class="qr-wrap">
    <a href="itms-services://?action=download-manifest&url=https://dupl3xx.github.io/qr-reader-ios/manifest.plist">
      <img
        class="qr-img"
        src="https://api.qrserver.com/v1/create-qr-code/?data=itms-services%3A%2F%2F%3Faction%3Ddownload-manifest%26url%3Dhttps%3A%2F%2Fdupl3xx.github.io%2Fqr-reader-ios%2Fmanifest.plist&size=220x220&bgcolor=1c1c1e&color=ffffff&qzone=2"
        alt="QR kód pro instalaci"
      />
    </a>
    <div class="qr-label">nebo klepni / naskenuj QR kód</div>
  </div>

  <div class="divider"></div>

  <div class="features">
    <div class="feature">
      <div class="feature-icon">🔲</div>
      <span>QR kódy z kamery i galerie</span>
    </div>
    <div class="feature">
      <div class="feature-icon">📊</div>
      <span>EAN-13, EAN-8, UPC, Code 128...</span>
    </div>
    <div class="feature">
      <div class="feature-icon">🌍</div>
      <span>CZ · EN · SK · DE · PL</span>
    </div>
    <div class="feature">
      <div class="feature-icon">🌙</div>
      <span>Tmavý / světlý režim</span>
    </div>
  </div>
</body>
</html>
